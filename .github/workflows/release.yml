name: release

# One Linux job and ONE macOS job (Apple Silicon cross-compiles the Intel
# target). Independent jobs, per-job asset upload: macOS queues can never
# block the release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: apple (aarch64 + x86_64)
          - os: ubuntu-latest
            name: linux x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build and package each target
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            targets="aarch64-apple-darwin x86_64-apple-darwin"
          else
            targets="x86_64-unknown-linux-gnu"
          fi
          for t in $targets; do
            rustup target add "$t"
            cargo build --release --target "$t"
            case "$t" in
              aarch64-apple-darwin) asset=xfin-macos-aarch64 ;;
              x86_64-apple-darwin) asset=xfin-macos-x86_64 ;;
              x86_64-unknown-linux-gnu) asset=xfin-linux-x86_64 ;;
            esac
            tar -C "target/$t/release" -czf "$asset.tar.gz" xfin
            shasum -a 256 "$asset.tar.gz" > "$asset.tar.gz.sha256"
          done
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xfin-*.tar.gz
            xfin-*.tar.gz.sha256
