name: release

# Cut a release by pushing a tag like `v0.1.0`. Builds per-platform tarballs
# named `xfin-<os>-<arch>.tar.gz` (exactly what `xfin self-update` looks for)
# and attaches them to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: xfin-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: xfin-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: xfin-linux-x86_64
          # linux-aarch64 dropped: keyring's secret-service backend links
          # libdbus, which pkg-config won't cross-compile on the x86_64 runner
          # (same coverage as the other family CLIs).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf ${{ matrix.asset }}.tar.gz xfin
          shasum -a 256 ${{ matrix.asset }}.tar.gz > ${{ matrix.asset }}.tar.gz.sha256
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.tar.gz.sha256
