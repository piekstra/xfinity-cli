# cargo-deny configuration. Run: cargo deny check
[advisories]
yanked = "deny"

[licenses]
# Permissive licenses we accept for dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The family's shared crates (pk-cli-*) are consumed as tag-pinned git deps
# until they land on crates.io.
allow-git = ["https://github.com/piekstra/cli-common"]
